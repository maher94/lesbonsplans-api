spring:
  application:
    name: lesbonsplans-api

  datasource:
    url: jdbc:postgresql://ep-green-truth-alci9aks.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require
    username: neondb_owner
    password: npg_1UDfopcQNg8a
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway gère le schéma, Hibernate valide seulement
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:lebonplan-super-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000       # 24h
    refresh-expiration-ms: 86400000  # 7 jours

  cloudinary:
    cloud-name: dq5priqz9
    api-key: 156328662248284
    api-secret: fBN4UDpiiC20Xvf9v6wcihgoykU
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
      - https://*.netlify.app
      - https://*.vercel.app
logging:
  level:
    com.lebonplan: DEBUG
    org.hibernate.SQL: DEBUG
